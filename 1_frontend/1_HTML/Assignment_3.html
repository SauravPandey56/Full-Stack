<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
</head>

<body>
    <!-- tables -->
    <table border="black">
        <caption>
            Student Information
        </caption>

        <tr>
            <th rowspan="6">info</th>
            <th rowspan="2">Name</th>
            <th colspan="2">Address</th>
        </tr>
        <tr>
            <th>city</th>
            <th>house</th>
        </tr>

        <tr>
            <td>A</td>
            <td>Delhi</td>
            <td>1</td>
        </tr>
        <tr>
            <td>b</td>
            <td>mumbai</td>
            <td>2</td>
        </tr>
        <tr>
            <td>c</td>
            <td>kolkata</td>
            <td>3</td>
        </tr>
        <tr>
            <td>D</td>
            <td>pune</td>
            <td>4</td>
        </tr>
    </table>
    <br><hr>

    <!-- forms-->

    <form action="/action">
       <label for="name">name:</label>
       <input type="text" name="name"><br>
       <label for="sex">SEX:</label>
       <input type="radio" name="sex" id="male" value="male">
       <label for="male">Male</label>
       <input type="radio" name="sex" id="female" value="female">
       <label for="female">female</label><br>
       <label for="country">Country:</label>
       <select name="country" id="ctr">
        <option >Select an option</option>
        <option value="ind">india</option>
        <option value="ger">germeny</option>
        <option value="ire">ireland</option>
        <option value="aus">australia</option>
        <option value="Sl">sri lanka</option>
        <option value="nwz">nwzeland</option>
       </select><br>
       <label for="message">Message : </label>
        <textarea name="message" id="message" cols="30" rows="3"></textarea>
       <br>

       <input type="checkbox" name="nl" id="nl">
       <label for="nl">Subscribe?</label>
       <br>
       <button type="submit">Submit</button>

    </form>
    <br><hr>
    <!-- forms-->
     <form action="/action"> 
        <fieldset>
                <legend>Feedback form </legend>
            <label for="name ">Name : </label>
            <input type="text" id=" name" placeholder="write your name"><br>
            <label for="email">Email:</label>
            <input type="email" id="email" placeholder="write your email"><br>
            <label for="comment ">Message:</label><br>
            <textarea name="comment" id="comment"></textarea><br>
            <label for="rating">Rate us our of 5 :</label><br>
            <input type="radio" name="rating" id="one" value="one">
            <label for="one">1</label><br>
            <input type="radio"name="rating" id="two" value="two">
            <label for="two">2</label><br>
            <input type="radio"name="rating" id="three" value="three">
            <label for="three">3</label><br>
            <input type="radio"name="rating" id="four" value="four">
            <label for="four">4</label><br>
            <input type="radio"name="rating" id="five" value="five">
            <label for="five">5</label><br>
            <button type="submit">send your message</button>
        </fieldset>
        
     </form>
</body>

</html>
